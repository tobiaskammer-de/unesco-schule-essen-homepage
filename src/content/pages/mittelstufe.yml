hero:
  eyebrow: "Unterricht · Mittelstufe · Klasse 7 – 10"
  title: "Die Mittelstufe."
  titleHighlight: "Klasse 7 bis 10."
  lede: "Fundiertes Wissen, methodische Klarheit und Zeit, den eigenen Weg zu finden — die Mittelstufe ist die tragende Phase zwischen Ankommen und Oberstufe."
  image: "assets/sp-lernend.jpg"
  imageAlt: ""

alert:
  label: "Bitte beachten"
  title: "Wichtige Information zur Aufnahme."
  body: "Mit der Einführung unserer neuen **Erprobungsstufe ab dem Schuljahr 2026/27** ändern sich die Aufnahmemöglichkeiten in die Mittelstufe. Lesen Sie die beiden Regeln unten aufmerksam oder sprechen Sie uns direkt an."

rules:
  - kind: "warning"
    badge: "Keine Aufnahme in Klasse 7"
    title: "In 2026/27 und 2028/29 keine 7. Klassen."
    body: "In diesen Schuljahren führen wir keine 7. Klassen: die entsprechenden Jahrgänge, die regulär in die Klasse 7 eintreten würden, können in diesen Jahren leider nicht an der UNESCO-Schule aufgenommen werden."
    requirement: ""
  - kind: "ok"
    badge: "Aufnahme ab Klasse 8 möglich"
    title: "Ab Schuljahr 2026/27 in Klasse 8 und höher."
    body: "Eine Aufnahme in die Klasse 8 (und höher) ist ab dem Schuljahr 2026/27 möglich."
    requirement: "**Voraussetzung:** Die Schülerin oder der Schüler muss Latein als zweite Fremdsprache mitbringen, da Latein an der UNESCO-Schule ab Klasse 7 als verbindliche zweite Fremdsprache unterrichtet wird."

path:
  title: "Ihr Weg zu uns."
  body: |
    Jeder Anmeldung geht ein persönliches Beratungs- und Informationsgespräch voraus. Wir nehmen uns gerne Zeit, um Ihre individuelle Situation zu besprechen und gemeinsam den besten Weg zu finden.

    Kontaktieren Sie uns telefonisch oder per E-Mail, wir melden uns zeitnah mit einem Terminvorschlag.
  image: "assets/sp-demokratie.jpg"
  imageAlt: "Beratungsgespräch an der UNESCO-Schule Essen"
