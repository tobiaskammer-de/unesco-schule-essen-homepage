hero:
  eyebrow: "Informieren · Schulstufen"
  title: "Stundentafeln"
  titleHighlight: "und Unterrichtsraster."
  lede: "Welche Fächer werden in welcher Klasse wie lange unterrichtet? Und wann beginnt die erste Stunde? Hier finden Sie alle organisatorischen Rahmendaten der Sekundarstufe I."

intro:
  title: "Ein klarer Rahmen — für ein"
  titleHighlight: "vielseitiges Lernen."
  body: |
    Die Stundentafel legt fest, mit wie vielen Wochenstunden jedes Fach in der Sekundarstufe I unterrichtet wird. Grundlage ist die **APO-SI (Anlage 6)**, ergänzt um das Profil unserer UNESCO-Schule.

    Zusätzlich erhalten Sie hier einen Überblick über das aktuelle Unterrichtsraster — also die Zeiten, in denen unsere Schülerinnen und Schüler lernen, Pause machen und nach Hause gehen.

raster:
  eyebrow: "Tagesstruktur"
  title: "Das aktuelle Unterrichtsraster."
  body: "45-Minuten-Stunden mit zwei großen Pausen am Vormittag und einer Mittagspause vor dem Nachmittagsunterricht."
