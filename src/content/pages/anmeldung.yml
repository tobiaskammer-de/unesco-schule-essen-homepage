hero:
  eyebrow: "Für Eltern · Anmeldung an die UNESCO-Schule"
  title: "Willkommen — und dann"
  titleHighlight: "ganz unkompliziert."
  lede: "Zwei Wege führen an unsere Schule: der Einstieg ab Klasse 5 und der Wechsel in die gymnasiale Oberstufe. Wir begleiten Sie und Ihr Kind Schritt für Schritt."

klasse5:
  eyebrow: "Weg A · Klasse 5"
  title: "Schuljahr 2026/27,"
  titleHighlight: "jetzt anmelden."
  intro: "Wenn Sie für Ihr Kind ein Gymnasium suchen, das anspruchsvollen Unterricht mit einer internationalen Denkweise verbindet, sind Sie bei uns richtig. So einfach geht's."

