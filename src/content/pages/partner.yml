hero:
  eyebrow: "Über Uns · Gemeinschaft & Netzwerk"
  title: "Mit wem wir"
  titleHighlight: "zusammenarbeiten."
  lede: "Schule funktioniert nicht allein. Unsere Partnerschaften reichen von weltweiten Netzwerken bis zu Essener Institutionen — und machen vieles von dem möglich, was unseren Alltag prägt."

intro:
  title: "Partner,"
  titleHighlight: "auf die wir bauen."
  body: |
    Über fünfzehn feste Partnerschaften tragen unser Schulprofil: das UNESCO-Netzwerk, die Universität Duisburg-Essen, Kultureinrichtungen wie die Theater und Philharmonie Essen sowie Stiftungen und Service-Clubs, die Projekte finanziell ermöglichen.

    Dazu kommen Essener Institutionen aus Sozialarbeit, Medien und Berufsorientierung. Auf dieser Seite haben wir sie sortiert, damit man sieht, wer uns in welchem Bereich begleitet.

categories:
  - label: "Netzwerk & Bildungsauftrag"
    intro: "Verbände und Organisationen, in deren Auftrag wir unseren Bildungsauftrag verstehen und weitertragen."
    items:
      - name: "UNESCO-Projektschulen"
        url: "https://www.unesco.de/bildung/unesco-projektschulen"
        logo: "assets/partners/unesco.png"
        desc: "Als eine von rund 300 deutschen UNESCO-Projektschulen sind wir Teil eines weltweiten Netzwerks — verpflichtet auf Frieden, Menschenrechte, kulturelle Vielfalt und nachhaltige Entwicklung."
      - name: "Stifterverband"
        url: "https://www.stifterverband.org"
        logo: "assets/partners/stifterverband.png"
        desc: "Einer der wichtigsten privaten Förderer für Bildung, Wissenschaft und Innovation in Deutschland. Partner u.a. beim MINT-Engagement."
  - label: "Hochschule & Studienorientierung"
    intro: "Mit wem wir zusammenarbeiten, wenn es um den Übergang in Studium und Beruf geht."
    items:
      - name: "Universität Duisburg-Essen"
        url: "https://www.uni-due.de"
        logo: "assets/partners/uni-due.png"
        desc: "UniTrainees-Programm, Studienfeld-Eignungstests, Talentscouting — und regelmäßige Informationsveranstaltungen direkt bei uns vor Ort."
      - name: "Agentur für Arbeit Essen"
        url: "https://www.arbeitsagentur.de/vor-ort/essen/startseite"
        logo: "assets/partners/agentur-arbeit.png"
        desc: "Berufsorientierung, Beratungstermine in Klasse 10 und der Sekundarstufe II sowie die Veranstaltungsreihe „Wege ins Berufsleben\"."
  - label: "Kultur"
    intro: "Unsere Partner für kulturelle Bildung — von der Oper bis zum Schauspiel."
    items:
      - name: "Theater und Philharmonie Essen"
        url: "https://www.theater-essen.de"
        logo: "assets/partners/tup.png"
        desc: "Offizielle Kooperationspartnerschaft 2025/26 — aktuelle Opernproduktion mit über 40 Schülerinnen und Schülern und den Essener Philharmonikern."
      - name: "Essener Philharmoniker"
        url: "https://www.theater-essen.de/philharmonie"
        logo: "assets/partners/philharmoniker.png"
        desc: "Gemeinsame Bühnenprojekte, Proben und Konzerterlebnisse."
      - name: "Freundeskreis Theater und Philharmonie"
        url: ""
        logo: "assets/partners/tup.png"
        desc: "Unterstützt unsere Schülerschaft mit Kartenkontingenten zu Oper, Ballett und klassischen Konzerten."
  - label: "Gemeinschaft vor Ort"
    intro: "Essener Partner, mit denen wir im Stadtteil und darüber hinaus Schule leben."
    items:
      - name: "Jugendhilfe Essen"
        url: "https://www.jugendhilfe-essen.de"
        logo: "assets/partners/jhe.png"
        desc: "Partner u.a. bei der Pop-Up-Ausstellung „Nur ein Bild!?\" und weiteren kulturell-politischen Projekten."
      - name: "Contact · Kommunikation · Sport · Event"
        url: "https://www.contact-essen.de"
        logo: "assets/partners/contact.png"
        desc: "Begleitung bei sportlichen Großveranstaltungen und Schulprojekten im öffentlichen Raum."
      - name: "Arche Noah Essen"
        url: "https://www.archenoah-essen.de"
        logo: "assets/partners/arche-noah.png"
        desc: "Soziales Engagement im Stadtteil und wiederkehrende Projekte zur gelebten Vielfalt."
      - name: "CSE"
        url: "https://www.cse.de"
        logo: "assets/partners/cse.png"
        desc: "Kooperation im Bereich Ausbildung, Berufsorientierung und Nachhaltigkeit."
      - name: "WDR"
        url: "https://www.wdr.de"
        logo: "assets/partners/wdr.png"
        desc: "Medienbildung und Zusammenarbeit bei dokumentarischen Schulprojekten."
  - label: "Stiftungen & Förderer"
    intro: "Private Stiftungen und Service-Clubs, deren Förderung vieles möglich macht."
    items:
      - name: "Goldschmidt Stiftung"
        url: "https://goldschmidt-stiftung.de"
        logo: "assets/partners/goldschmidt-stiftung.png"
        desc: "Unterstützt Bildungs- und Kulturprojekte der UNESCO-Schule Essen."
      - name: "Goldschmidt Thermit Group"
        url: "https://www.goldschmidt.com"
        logo: "assets/partners/goldschmidt-thermit.png"
        desc: "Wirtschaftspartner mit Fokus auf MINT-Bildung, Praktika und Berufsorientierung."
      - name: "Rotary Club Essen"
        url: "https://www.rotary-essen.de"
        logo: "assets/partners/rotary.png"
        desc: "Intensive Förderung mit Arbeitsmaterialien, Schulhofgestaltung und Auslandsaufenthalten — über viele Jahre ein verlässlicher Partner."
      - name: "IWC Essen-Nord"
        url: "https://www.iwc-essen-nord.de"
        logo: "assets/partners/iwc.png"
        desc: "Frauenförderung und Mentoring für Schülerinnen."

cta:
  eyebrow: "Interesse an einer Kooperation?"
  title: "Gemeinsam"
  titleHighlight: "mehr bewegen."
  body: "Wenn Sie als Institution, Stiftung oder Unternehmen eine Kooperation mit uns aufbauen möchten: Wir freuen uns auf Ihre Nachricht. Die besten Partnerschaften entstehen dort, wo sich beide Seiten engagieren."
