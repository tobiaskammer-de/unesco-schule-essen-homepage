    Wie lang ist ein Schultag? Was heißt eigentlich „UNESCO-Projektschule\"? Gibt es Betreuung nach der sechsten Stunde? Welche Sprachen lernt mein Kind? In jedem Infogespräch kommen dieselben Themen wieder.

