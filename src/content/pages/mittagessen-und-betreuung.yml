      meta: "PDF · 38 KB · 1 Seite"
      url: "assets/Anmeldung-Uebermittagsbetreuung-2026-27.pdf"

closing:
  title: "Noch Fragen"
  titleHighlight: "zum Mittag?"
  body: "Ob Bildung-und-Teilhabe-Paket, Speiseplan oder Anmeldung zur Betreuung: Frau Axer im Sekretariat ist Ihre erste Anlaufstelle. Wir melden uns werktags in der Regel innerhalb von 24 Stunden zurück."
  primaryLabel: "Kontakt aufnehmen"
  primaryUrl: "Kontakt.html"
  secondaryLabel: "Anmeldung an die Schule"
  secondaryUrl: "Anmeldung.html"
