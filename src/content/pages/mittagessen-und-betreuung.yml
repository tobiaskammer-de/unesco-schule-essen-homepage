hero:
  eyebrow: "Service · Digitales & Alltag"
  title: "Gut versorgt"
  titleHighlight: "am Mittag."
  lede: "Ab dem Schuljahr 2026/27 gibt es bei uns endlich ein warmes Mittagessen — und für die neuen Fünftklässler eine verlässliche Übermittagsbetreuung. Damit Ihr Kind gestärkt und gut aufgehoben in den Nachmittag startet."

pillars:
  eyebrow: "Für Eltern auf einen Blick"
  title: "Zwei Angebote,"
  titleHighlight: "ein gutes Gefühl."
  intro: "Beides ist freiwillig und unabhängig voneinander wählbar. Sie entscheiden, was zu Ihrem Familienalltag passt."
  mittagessen:
    badge: "Neu ab 2026/27"
    title: "Warmes Mittagessen"
    body: "Frisch zubereitet von der Kantine Kayser. Montag bis Donnerstag warmes Essen mit Dessert, Freitag Kiosk-Angebot — und immer eine vegetarische Option."
    bullets:
      - "72,00 € pro Monat"
      - "Anmeldung online unter kantinekayser.de"
      - "Bildung-und-Teilhabe-Paket möglich"
  betreuung:
    badge: "Klassen 5"
    title: "Übermittagsbetreuung"
    body: "Verlässliche Betreuung durch die Caritas SkF Essen direkt in der Schule. Montag bis Donnerstag nach dem Unterricht — eine ruhige, vertraute Anlaufstelle."
    bullets:
      - "Montag bis Donnerstag, 13:30 – 15:00 Uhr"
      - "Einzelne Tage halbjahresweise wählbar"
      - "Start: Montag, 7. September 2026"

mittagessenDetail:
  eyebrow: "Mittagessen"
  title: "Endlich warm. Endlich"
  titleHighlight: "jeden Tag."
  lead: "Gemeinsam essen, sich austauschen, dann konzentriert in den Nachmittag — das wünschen sich Familien, und das bekommen Sie ab dem neuen Schuljahr bei uns."
  body: "Die Teilnahme ist freiwillig und tageweise oder dauerhaft möglich. Auch eine Barzahlung ist möglich, sodass auch spontane Esser:innen versorgt sind."
  facts:
    - label: "Kosten"
      value: "72 €"
      note: "pro Monat"
    - label: "Wochenrhythmus"
      value: "Mo – Do warm"
      note: "Freitag: Kiosk-Angebot"
    - label: "Vegetarisch"
      value: "Immer verfügbar"
      note: "als gleichwertige Option"
    - label: "Anmeldung"
      value: "Online"
      note: "oder per QR-Code in der Schule"
  infoTitle: "Bildung und Teilhabe:"
  infoBody: "Anspruchsberechtigte Familien können das Mittagessen über das Bildung-und-Teilhabe-Paket finanzieren lassen. Sprechen Sie uns an — wir helfen unkompliziert weiter."
  externalLinkLabel: "Zur Anmeldung bei Kantine Kayser"
  externalLinkUrl: "https://www.kantinekayser.de"

betreuungDetail:
  eyebrow: "Übermittagsbetreuung"
  title: "Eine vertraute Anlaufstelle"
  titleHighlight: "nach dem Unterricht."
  lead: "Die Caritas SkF Essen begleitet Ihr Kind in den Klassen 5 nach Unterrichtsschluss: Mittagessen, Hausaufgaben, Spielen, Ausruhen — in einem festen Team und mit einem klaren Rahmen."
  body: "So überbrücken Sie den Nachmittag verlässlich, auch wenn Beruf und Familie nicht immer im selben Takt schlagen. Eine Anmeldung ist tageweise möglich und gilt jeweils für ein Schulhalbjahr."
  facts:
    - label: "Träger"
      value: "Caritas SkF"
      note: "Essen gGmbH"
    - label: "Klassen"
      value: "Jahrgang 5"
      note: "im Schuljahr 2026/27"
    - label: "Zeit"
      value: "13:30 – 15:00 Uhr"
      note: "Mo – Do (Fr keine Betreuung)"
    - label: "Start"
      value: "7. September 2026"
      note: "erster Schultag des Halbjahres"
  infoTitle: "So melden Sie an:"
  infoBody: "Anmeldebogen herunterladen, ausfüllen und per E-Mail an uebermittagsbetreuung@cse.ruhr senden. Einzelne Wochentage sind wählbar und für ein Schulhalbjahr verbindlich."
  contactEmail: "uebermittagsbetreuung@cse.ruhr"

downloads:
  eyebrow: "Zum Mitnehmen"
  title: "Alle Infos"
  titleHighlight: "als PDF."
  intro: "Beide Dokumente fassen die wichtigsten Punkte zusammen — zum Ausdrucken, Weitergeben oder ruhig in der Familie nachlesen."
  files:
    - label: "Mittagessen"
      title: "Mittagsverpflegung 2026/27"
      body: "Ein Überblick zum warmen Mittagessen, zu Kosten, Anmeldung und Vegetarisch-Option."
