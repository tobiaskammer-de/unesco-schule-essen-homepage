join:
  title: "Mitglied werden."
  titleHighlight: "Mit dabei sein."
  body: "Sie möchten den Förderverein unterstützen, als Eltern, als Ehemalige, als Freundinnen und Freunde unserer Schule? Wir freuen uns über jedes Mitglied und jede Spende."
  note: "**Bankverbindung, Beitragshöhe und Mitgliedsantrag** senden wir Ihnen auf Anfrage gerne zu. Die Informationen liegen aktuell beim Vorstand und im Sekretariat."
