hero:
  badge: "Gemeinnützig · gegründet 2007"
  eyebrow: "Über Uns · Förderverein"
  title: "Der Förderverein —"
  titleHighlight: "mehr möglich machen."
  lede: "Als gemeinnützig anerkannter Verein unterstützt der Förderverein die pädagogische Arbeit an der UNESCO-Schule und macht Projekte möglich, die über das reguläre Schulbudget hinausgehen."

purpose:
  title: "Warum wir diesen Verein brauchen."
  body: |
    Ein Gymnasium mit UNESCO-Auftrag braucht mehr als Standardausstattung. Der Förderverein verbessert die Schule als Lebensraum: mit Musikinstrumenten, wissenschaftlicher Ausrüstung, kulturellen Veranstaltungen und ganz konkreter finanzieller Hilfe, wenn Familien sie brauchen.

    Jedes Mitglied trägt dazu bei, dass unsere Schülerinnen und Schüler nicht nur lernen, sondern erleben, experimentieren, auftreten, reisen, und dass niemand zurückbleibt, weil die Mittel fehlen.

goals:
  eyebrow: "Fünf Arbeitsfelder"
  title: "Was wir konkret fördern."
  list:
    - n: "01"
      title: "Unterrichtsmaterial & Fachbücher"
      body: "Anschaffung von Unterrichtsmaterialien und Fachbüchern, die Standardetats nicht abdecken."
    - n: "02"
      title: "Kulturelle Veranstaltungen"
      body: "Unterstützung von Aufführungen, Ausstellungen, Lesungen und Projekttagen."
    - n: "03"
      title: "Schulsport"
      body: "Förderung sportlicher Angebote, von Ausrüstung bis zu Wettkampf-Teilnahmen."
    - n: "04"
      title: "Schüler in Not"
      body: "Individuelle finanzielle Hilfe, damit keine Schülerin und kein Schüler aus Geldgründen zurückbleibt."
    - n: "05"
      title: "Eltern- und Schülervertretung"
      body: "Förderung der Arbeit von Elternvertretung und Schülervertretung."

