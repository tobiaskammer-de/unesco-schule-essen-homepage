hero:
  eyebrow: "Angebote · Beratung & Mitbestimmung"
  title: "Beratung und"
  titleHighlight: "Unterstützung."
  lede: "Schule ist mehr als Unterricht. Wir hören zu, wenn's schwierig wird — vertraulich, auf Augenhöhe und mit klaren Ansprechpersonen für jede Situation."

intro:
  title: "Wer uns braucht,"
  titleHighlight: "findet uns."
  body: |
    Ob Lernschwierigkeiten, Mobbing, Sorgen zu Hause, die Frage nach dem richtigen Studium oder Schulangst — bei uns gibt es für jede Situation jemanden, der zuhört.

    Drei feste Anlaufstellen ergänzen sich: der **Beratungslehrer**, der **Talentscout** der Universität Duisburg-Essen und die **Schulsozialarbeit**. Alle Gespräche sind vertraulich.
  pledge: "Für Beratung und Schulsozialarbeit gilt die Schweigepflicht. Du kannst über alles reden, was dich bedrückt."

overview:
  eyebrow: "Drei Anlaufstellen"
  title: "Wer berät wofür?"
  cards:
    - label: "Schule & Alltag"
      title: "Beratungslehrer"
      body: "Lernschwierigkeiten, Konflikte mit Mitschülerinnen oder Lehrkräften, Sorgen im Alltag — erste Adresse für Schülerinnen, Schüler und Eltern."
      href: "#beratungslehrer"
      cta: "Mehr erfahren →"
    - label: "Uni-Übergang"
      title: "Talentscout"
      body: "Begleitung auf dem Weg in ein Studium — gerade dann, wenn niemand in der Familie bisher studiert hat. Kostenfrei, vor Ort, langfristig."
      href: "#talentscout"
      cta: "Mehr erfahren →"
    - label: "Vertraulich"
      title: "Schulsozialarbeit"
      body: "Wenn zu Hause Ärger ist, es finanzielle Probleme gibt oder einfach nichts mehr klappt — wir unterstützen und schweigen."
      href: "#schulsozialarbeit"
      cta: "Mehr erfahren →"

beratungslehrer:
  eyebrow: "01 · Beratungslehrer"
  title: "Wenn im Schulalltag"
  titleHighlight: "etwas klemmt."
  lede: "Erste Anlaufstelle für Schülerinnen, Schüler und Eltern — bei schulischen, sozialen und persönlichen Themen, die den Schulalltag beeinflussen."
  qa:
    - q: "Wer wird beraten?"
      a: "Schülerinnen und Schüler sowie Eltern — unabhängig von Jahrgang und Schulform."
    - q: "Wie wird beraten?"
      a: "Vertrauliche Einzelgespräche. Bei Bedarf vermittle ich Kontakt zu außerschulischen Beratungsstellen."
    - q: "Wo findest du mich?"
      a: "Sprich mich im Lehrerzimmer an oder wo immer du mich triffst. Wir vereinbaren einen Termin. Alternativ: Telefonnummer im Sekretariat hinterlassen — ich rufe zurück."
  topics:
    - "Lernschwierigkeiten"
    - "Konzentrationsstörungen"
    - "Ärger mit Mitschüler*innen"
    - "Probleme mit den Eltern"
    - "Angst vor Gewalt"
    - "Mobbing"
    - "Schulangst"
    - "Drogenprobleme"
    - "Konfliktberatung"
    - "Kontakt zu externen Stellen"
  contactSubline: "Ansprechpartner für Schülerinnen, Schüler und Eltern"
  contactRoom: "Lehrerzimmer / Sekretariat"

talentscout:
  eyebrow: "02 · Talentscout"
  title: "Gleiche Chancen —"
  titleHighlight: "unabhängig vom Elternhaus."
  lede: "Ziel des NRW-Talentscoutings ist es, jungen Menschen gleiche Bildungschancen zu ermöglichen — unabhängig von Bildungshintergrund oder Einkommen der Eltern."
  qa:
    - q: "Für wen?"
      a: "Insbesondere Jugendliche ohne akademische Wurzeln, die sich ein Studium zutrauen sollen — wir ermutigen und begleiten."
    - q: "Was gibt's?"
      a: "Regelmäßige Beratungsgespräche vor Ort in der Schule. Orientierung beim Übergang von Schule zu Hochschule. Begleitung auch nach dem Abitur."
    - q: "Von wem?"
      a: "Sarah Schröter, Talentscout der Universität Duisburg-Essen — regelmäßig bei uns im Haus und erreichbar über das Sekretariat."
    - q: "Was kostet's?"
      a: "Nichts. Das Angebot ist für Schülerinnen und Schüler kostenfrei — finanziert durch das NRW-Talentscouting."
  contactName: "Sarah Schröter"
  contactSubline: "Universität Duisburg-Essen · NRW-Talentscouting"
  contactRoom: "Regelmäßig vor Ort · Termine über das Sekretariat"

schulsozialarbeit:
  eyebrow: "03 · Schulsozialarbeit"
  title: "Wenn's mal"
  titleHighlight: "nicht so gut läuft."
  lede: "Für alles, was dich bedrückt — und nicht in Schulnoten passt. Wir unterstützen dich dort, wo du dir Hilfe wünschst. Vertraulich, auf Augenhöhe."
  concerns:
    - "…wenn es dir nicht so gut geht und du nicht weiter weißt"
    - "…wenn du zu Hause Ärger hast und dich nicht wohlfühlst"
    - "…wenn es mit Lehrern oder Mitschülern Stress gibt"
    - "…wenn Schule nicht klappt und du nicht weißt, wie's weitergehen soll"
    - "…wenn du Probleme mit Ämtern hast"
    - "…wenn du Unterstützung bei Anträgen brauchst"
    - "…wenn du finanzielle Probleme hast"
    - "…wenn du einfach mal reden möchtest"
  contactSubline: "Schulsozialarbeiterin · Schweigepflicht gilt"
  contactRoom: "Raum 103A · komm vorbei oder frag am Lehrerzimmer"
