backend:
  name: github
  repo: tobiaskammer-de/unesco-schule-essen-homepage
  branch: main
  # Sveltia bietet zwei Login-Wege:
  # 1. „Sign in with GitHub"  — über den gehosteten OAuth-Dienst von Sveltia
  # 2. „Sign in with Personal Access Token"  — 100 % lokal, zuverlässig,
  #    kein externer Dienst nötig. Empfohlener Weg.
  # Kein base_url hier, damit Sveltia beide Wege anbietet.

# Medien-Ordner: Bilder landen in public/assets/news/
# public_folder enthält den GitHub-Pages-Base-Pfad, damit Bilder in Markdown-Body
# und Frontmatter direkt funktionieren (ohne weitere URL-Transformation).
media_folder: public/assets/news
public_folder: /unesco-schule-essen-homepage/assets/news

# UI
site_url: https://tobiaskammer-de.github.io/unesco-schule-essen-homepage
display_url: https://tobiaskammer-de.github.io/unesco-schule-essen-homepage
logo_url: /unesco-schule-essen-homepage/assets/logo-mark.png

publish_mode: simple

locale: de

collections:
  - name: news
    label: "Nachrichten"
    label_singular: "Nachricht"
    folder: src/content/news
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: md
    format: frontmatter
    summary: "{{title}} — {{category}} ({{year}}-{{month}}-{{day}})"
    sortable_fields: [date, title, category]
    view_filters:
      - label: Veröffentlicht
        field: draft
        pattern: false
      - label: Entwürfe
        field: draft
        pattern: true
    fields:
      - { name: title, label: "Titel", widget: string }
      - { name: date, label: "Datum", widget: datetime, date_format: "YYYY-MM-DD", time_format: false, picker_utc: false }
      - name: category
        label: "Kategorie"
        widget: select
        options:
          - UNESCO-Projekttag
          - Kooperation
          - Ausstellung
          - Sprachen
          - Wettbewerb
          - Aus dem Unterricht
          - Termine
          - Allgemein
        default: Allgemein
      - { name: excerpt, label: "Teaser (1–2 Sätze, max. 320 Zeichen)", widget: text, pattern: ['^.{40,320}$', "Bitte 40–320 Zeichen."] }
      - { name: coverImage, label: "Coverbild", widget: image, choose_url: false, media_library: { config: { multiple: false } } }
      - { name: coverAlt, label: "Bildbeschreibung (für Screenreader)", widget: string, hint: "Was ist auf dem Bild zu sehen? Kein 'Foto von …'." }
      - { name: author, label: "Autorin / Autor", widget: string, required: false, default: "UNESCO-Schule Essen" }
      - { name: draft, label: "Entwurf (nicht veröffentlichen)", widget: boolean, default: false }
      - name: body
        label: "Haupttext"
        widget: markdown
        hint: "Überschriften mit ## · Fettdruck mit **Text** · Bilder per Drag&Drop oder Bild-Button einfügen."
        buttons: [bold, italic, link, heading-two, heading-three, quote, bulleted-list, numbered-list]
        editor_components: [image, code-block]

  - name: teachers
    label: "Lehrkräfte"
    label_singular: "Lehrkraft"
    folder: src/content/teachers
    create: true
    slug: "{{fields.lastName | slug}}-{{fields.firstName | slug}}"
    extension: md
    format: frontmatter
    # Kollegiums-Fotos landen separat von News-Bildern
    media_folder: "/public/assets/kollegium"
    public_folder: "/unesco-schule-essen-homepage/assets/kollegium"
    summary: "{{lastName}}, {{firstName}} — {{subjects}}"
    sortable_fields: [lastName, firstName]
    view_filters:
      - label: "Im Referendariat"
        field: isTrainee
        pattern: true
      - label: "Festes Kollegium"
        field: isTrainee
        pattern: false
    fields:
      - { name: firstName, label: "Vorname", widget: string }
      - { name: lastName, label: "Nachname", widget: string }
      - { name: title, label: "Titel (z. B. Dr.)", widget: string, required: false }
      - { name: subjects, label: "Fächer", widget: list, required: false, default: [] }
      - { name: roles, label: "Funktionen / Sonderrollen", widget: list, required: false, default: [], hint: "Wichtig — diese Schreibweisen sind verknüpft mit den Seiten Schulleitung/Beratung/Mittelstufe/Oberstufe und werden dort automatisch angezeigt: Schulleitung · Stellvertretende Schulleitung · Koordination Sek I · Koordination Sek II · Koordination Erprobungsstufe · Stufenleitung EF · Sekretariat · Beratungslehrer · Schulsozialarbeit. Weitere freie Rollen (z. B. Klassenleitung 7a) sind möglich." }
      - { name: email, label: "E-Mail", widget: string, pattern: ['^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$', "Bitte eine gültige E-Mail."] }
      - { name: phone, label: "Telefon (optional)", widget: string, required: false }
      - { name: photo, label: "Portrait-Foto", widget: image, required: false, choose_url: false, media_library: { config: { multiple: false } } }
      - { name: isTrainee, label: "Im Referendariat (nicht festangestellt)", widget: boolean, default: false }
      - { name: order, label: "Manuelle Reihenfolge (optional)", widget: number, required: false, hint: "Niedrige Zahlen kommen zuerst. Leer lassen für alphabetische Sortierung." }

  # =====================================================================
  # Schul-Stammdaten — wirken auf alle Seiten, die diese Werte beziehen
  # =====================================================================
  - name: site
    label: "Schul-Stammdaten"
    label_singular: "Schul-Stammdaten"
    editor:
      preview: false
    files:
      - file: src/content/site/school.yml
        label: "Adresse, Kontakte, Schuljahr"
        name: school
        format: yaml
        fields:
          - { name: name, label: "Schulname (kurz)", widget: string }
          - { name: nameLong, label: "Schulname (lang)", widget: string }
          - { name: schoolYear, label: "Aktuelles Schuljahr", widget: string, hint: "z. B. 2026/27 — wird auf mehreren Seiten verwendet." }
          - name: address
            label: "Anschrift"
            widget: object
            fields:
              - { name: street, label: "Straße + Hausnr.", widget: string }
              - { name: postal, label: "PLZ", widget: string }
              - { name: city, label: "Ort", widget: string }
          - { name: phone, label: "Telefon Sekretariat", widget: string }
          - { name: phoneOberstufe, label: "Telefon Oberstufenbüro", widget: string, required: false }
          - { name: fax, label: "Telefax", widget: string, required: false }
          - { name: emailGeneral, label: "E-Mail allgemein", widget: string, pattern: ['^[^@\s]+@[^@\s]+\.[^@\s]+$', "Bitte gültige E-Mail."] }
          - { name: emailContact, label: "E-Mail Kontaktformular", widget: string, required: false }
          - { name: emailOberstufe, label: "E-Mail Oberstufe", widget: string, required: false }

  # =====================================================================
  # Seiten-Inhalte — Texte, Hero-Bereiche, Listen pro Seite
  # =====================================================================
  - name: pages
    label: "Seiten"
    label_singular: "Seite"
    editor:
      preview: false
    files:
      # ---------------- STARTSEITE ----------------
      - file: src/content/pages/home.yml
        label: "Startseite"
        name: home
        format: yaml
        fields:
          - name: hero
            label: "Hero (oberer Bereich)"
            widget: object
            collapsed: false
            fields:
              - { name: eyebrow, label: "Eyebrow (kleine Überschrift)", widget: string }
              - { name: title, label: "Titel — Zeile 1", widget: string }
              - { name: titleHighlight, label: "Titel — Zeile 2 (Akzent)", widget: string, required: false }
              - { name: sub, label: "Untertext", widget: text }
              - { name: ctaLabel, label: "Button-Text", widget: string }
              - { name: ctaHref, label: "Button-Link", widget: string, hint: "z. B. #was-uns-auszeichnet oder Anmeldung.html" }
              - { name: imageSrc, label: "Hero-Bild", widget: image, choose_url: false }
              - { name: imageAlt, label: "Bildbeschreibung (für Screenreader)", widget: string }
          - name: path
            label: 'Sektion „Dein Weg zu uns"'
            widget: object
            collapsed: true
            fields:
              - { name: title, label: "Überschrift", widget: string }
              - { name: intro, label: "Einleitung", widget: text }
              - name: cards
                label: "Drei Karten"
                widget: list
                fields:
                  - { name: kicker, label: "Kicker (Mini-Label oben)", widget: string }
                  - { name: title, label: "Karten-Titel (optional)", widget: string, required: false }
                  - { name: bigDate, label: "Großes Datum (optional)", widget: string, required: false }
                  - { name: bigDateSub, label: "Datum-Untertitel", widget: string, required: false }
                  - { name: text, label: "Text", widget: text, required: false }
                  - { name: ctaLabel, label: "Button-Text (optional)", widget: string, required: false }
                  - { name: ctaHref, label: "Button-Link", widget: string, required: false }
          - name: partners
            label: "Partner-Sektion"
            widget: object
            collapsed: true
            fields:
              - { name: eyebrow, label: "Eyebrow", widget: string }
              - { name: title, label: "Überschrift", widget: string }
              - { name: intro, label: "Einleitung", widget: text }

      # ---------------- ANMELDUNG ----------------
      - file: src/content/pages/anmeldung.yml
        label: "Anmeldung"
        name: anmeldung
        format: yaml
        fields:
          - name: hero
            label: "Hero"
            widget: object
            collapsed: false
            fields:
              - { name: eyebrow, label: "Eyebrow", widget: string }
              - { name: title, label: "Titel — Zeile 1", widget: string }
              - { name: titleHighlight, label: "Titel — Zeile 2 (kursiv)", widget: string, required: false }
              - { name: lede, label: "Einleitungstext", widget: text }
          - name: klasse5
            label: "Klasse-5-Block"
            widget: object
            collapsed: true
            fields:
              - { name: eyebrow, label: "Eyebrow", widget: string }
              - { name: title, label: "Überschrift Zeile 1", widget: string }
              - { name: titleHighlight, label: "Überschrift Zeile 2 (kursiv)", widget: string, required: false }
              - { name: intro, label: "Einleitung", widget: text }
          - name: termine
            label: "Anmeldetermine"
            widget: object
            collapsed: false
            fields:
              - { name: kicker, label: "Kicker (Mini-Label)", widget: string }
              - { name: title, label: "Überschrift", widget: string }
              - { name: intro, label: "Hinweis-Text", widget: text }
              - name: list
                label: "Termin-Liste"
                widget: list
                hint: "Diese Tabelle ist die wichtigste jährliche Änderung — bitte aktuell halten."
                fields:
                  - { name: date, label: "Datum (TT.MM.JJJJ)", widget: string }
                  - { name: day, label: "Wochentag", widget: string }
                  - { name: time, label: "Uhrzeit", widget: string }
          - name: closing
            label: "Abschluss-Block"
            widget: object
            collapsed: true
            fields:
              - { name: title, label: "Überschrift", widget: string }
              - { name: text, label: "Text", widget: text }

      # ---------------- LEITBILD ----------------
      - file: src/content/pages/leitbild.yml
        label: "Leitbild"
        name: leitbild
        format: yaml
        fields:
          - name: hero
            label: "Hero"
            widget: object
            collapsed: false
            fields:
              - { name: badge, label: "Hinweis-Badge (optional)", widget: string, required: false }
              - { name: eyebrow, label: "Eyebrow", widget: string }
              - { name: title, label: "Titel — Zeile 1", widget: string }
              - { name: titleHighlight, label: "Titel — Zeile 2 (kursiv)", widget: string, required: false }
              - { name: lede, label: "Einleitungstext", widget: text }
          - name: motto
            label: "Motto-Block"
            widget: object
            collapsed: true
            fields:
              - { name: quote, label: "Zitat", widget: string }
              - { name: sub, label: "Begleittext", widget: text }
          - name: values
            label: 'Sektion „Drei Überzeugungen"'
            widget: object
            collapsed: true
            fields:
              - { name: eyebrow, label: "Eyebrow", widget: string }
              - { name: title, label: "Überschrift", widget: string }
              - name: cards
                label: "Drei Karten"
                widget: list
                fields:
                  - { name: num, label: "Nummer (z. B. 01)", widget: string }
                  - { name: title, label: "Titel", widget: string }
                  - { name: text, label: "Text", widget: text }
          - name: closing
            label: "Abschluss-Block"
            widget: object
            collapsed: true
            fields:
              - { name: title, label: "Überschrift", widget: string }
              - { name: text, label: "Text", widget: text }
